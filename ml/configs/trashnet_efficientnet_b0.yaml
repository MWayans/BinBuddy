experiment:
  name: trashnet_efficientnet_b0_v1
  seed: 42
  description: "EfficientNet-B0 baseline on TrashNet resized dataset"

dataset:
  name: trashnet
  # Relative to ml/ directory unless overridden by DATA_ROOT env var
  path: data/raw/trashnet/dataset-resized
  classes:
    - cardboard
    - glass
    - metal
    - paper
    - plastic
    - trash
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  image_size: 224
  num_workers: 2

augmentation:
  train:
    random_resized_crop: true
    horizontal_flip: true
    rotation_degrees: 15
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.05
  val:
    resize: 256
    center_crop: 224

model:
  architecture: efficientnet_b0
  pretrained: true
  num_classes: 6
  dropout: 0.2

training:
  epochs: 25
  batch_size: 32
  optimizer: adamw
  learning_rate: 0.0003
  weight_decay: 0.01
  scheduler: cosine
  label_smoothing: 0.05
  early_stopping_patience: 7
  mixed_precision: true

checkpointing:
  monitor: val_macro_f1
  mode: max
  save_best_only: true

output:
  runs_dir: runs
  registry_dir: registry
